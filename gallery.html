<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | SAGA</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Modal Styling */
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(5px);
        justify-content: center;
        align-items: center;
    }
    .modal-content {
        max-width: 90%;
        max-height: 85%;
        border: 2px solid #bd9f67;
        border-radius: 10px;
    }
    .close-modal {
        position: absolute;
        top: 20px; right: 30px;
        color: #fff; font-size: 40px; cursor: pointer;
    }
    /* Loading Spinner */
    .loader {
        text-align: center;
        padding: 20px;
        color: #bd9f67;
        font-weight: bold;
        display: none;
    }
  </style>
</head>
<body>
  <div class="background_page"></div>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="bio.html">Bio Student</a>
    <a href="gallery.html">Gallery</a>
    <a href="pesan.html">Kesan & Pesan</a>
  </nav>

  <div class="main-container fade-in">
    <h1 style="text-align: center; color: #bd9f67; margin-bottom: 40px; letter-spacing: 3px;">MEMORY GALLERY</h1>
    <div class="responsive-grid" id="saga-gallery"></div>
    <div id="loader" class="loader">Memuat foto lainnya...</div>
  </div>

  <div id="photoModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="imgFull">
  </div>

  <script>
    const container = document.getElementById('saga-gallery');
    const modal = document.getElementById('photoModal');
    const modalImg = document.getElementById('imgFull');
    const closeBtn = document.querySelector('.close-modal');
    const loader = document.getElementById('loader');

    let currentPhoto = 1;
    const totalPhotos = 100;
    const photosPerPage = 12; // Jumlah foto yang dimuat setiap kali scroll
    let isLoading = false;

    function loadPhotos() {
        if (currentPhoto > totalPhotos || isLoading) return;
        
        isLoading = true;
        loader.style.display = "block";

        const limit = Math.min(currentPhoto + photosPerPage - 1, totalPhotos);
        
        for (let i = currentPhoto; i <= limit; i++) {
            const img = document.createElement('img');
            // Menggunakan .png sesuai struktur file Anda [cite: 10]
            img.src = `photo_galeri/img${i}.png`; 
            img.className = 'gallery-img';
            img.alt = `Memory ${i}`;
            img.loading = 'lazy'; // Lazy loading bawaan browser [cite: 10]
            
            img.onclick = function() {
                modal.style.display = "flex";
                modalImg.src = this.src;
            }
            container.appendChild(img);
        }

        currentPhoto = limit + 1;
        isLoading = false;
        loader.style.display = "none";
    }

    // Load foto pertama kali
    loadPhotos();

    // Deteksi scroll untuk memuat foto tambahan (Infinite Scroll)
    window.onscroll = function() {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            loadPhotos();
        }
    };

    closeBtn.onclick = () => modal.style.display = "none";
    window.onclick = (e) => { if(e.target == modal) modal.style.display = "none"; }
  </script>
</body>
</html>
